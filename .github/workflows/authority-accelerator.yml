name: "Elite Authority Accelerator"

on:
  schedule:
    - cron: "0 */6 * * *" # Every 6 hours
  workflow_dispatch:

jobs:
  ping-engines:
    name: Search Engine Force Index
    runs-on: ubuntu-latest
    steps:
      - name: Ping Google
        run: |
          curl -I "https://www.google.com/ping?sitemap=https://irsyad-architect.surge.sh/sitemap.xml"
          
      - name: Ping Bing (IndexNow)
        run: |
          curl -I "https://www.bing.com/ping?sitemap=https://irsyad-architect.surge.sh/sitemap.xml"

  social-traffic:
    name: GitHub Authority Boost
    runs-on: ubuntu-latest
    permissions:
      issues: write
      discussions: write
    steps:
      - name: Create System Vital Log (Issue)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
          gh issue create \
            --title "System Vital Check [$TIMESTAMP]" \
            --body "Automated system integrity check for M. Irsyad Fachryanto Digital Ecosystem. Status: ACTIVE. Performance: OPTIMAL." \
            --label "documentation"
          
          # Close it immediately to keep it clean (Quickdraw trigger)
          ISSUE_NUMBER=$(gh issue list --limit 1 --json number -q '.[0].number')
          gh issue close $ISSUE_NUMBER --comment "Vital check completed successfully."
