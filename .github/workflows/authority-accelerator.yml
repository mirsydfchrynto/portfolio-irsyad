name: "Perpetual Branding Engine V4.0"

on:
  schedule:
    - cron: "0 */3 * * *" # Every 3 hours - Brutal consistency
  workflow_dispatch:

jobs:
  index-domination:
    name: Global Index Acceleration
    runs-on: ubuntu-latest
    steps:
      - name: Force Ping Search Engines
        run: |
          echo ">>> Initiating Global Indexing Pulse..."
          curl -I "https://www.google.com/ping?sitemap=https://irsyad-architect.surge.sh/sitemap.xml"
          curl -I "https://www.bing.com/ping?sitemap=https://irsyad-architect.surge.sh/sitemap.xml"
          
      - name: Authority Seeding (Web Archive)
        run: |
          echo ">>> Seeding URL to Global Archive (Backlink Boost)..."
          curl -I "https://web.archive.org/save/https://irsyad-architect.surge.sh/" || echo "Archive busy, skipping."

  social-heartbeat:
    name: GitHub & Social Presence
    runs-on: ubuntu-latest
    permissions:
      issues: write
      discussions: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: System Vital Handshake
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TIMESTAMP=$(date +'%Y-%m-%d %H:%M:%S')
          # Maintain 'Galaxy Brain' and 'Quickdraw' signals
          gh issue create \
            --title "Digital Integrity Log [$TIMESTAMP]" \
            --body "Automated heartbeat for M. Irsyad Fachryanto. Performance: ELITE. All systems operational." \
            --label "documentation"
          
          # Use explicit repo flag to ensure GH CLI finds the context
          ISSUE_NUMBER=$(gh issue list --repo ${{ github.repository }} --limit 1 --json number -q '.[0].number')
          gh issue close $ISSUE_NUMBER --repo ${{ github.repository }} --comment "Handshake verified. Integrity at 100%."

